<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a" />
  <link rel="stylesheet" href="styles.css?v=1.0.0">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png" sizes="300x300">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
</head>

<body>
  <div id="img-popup" class="img-popup" onclick="closePopup()">
    <img id="popup-img" src="" alt="">
  </div>

  <header class="appbar app-header">
  <!-- Colonne gauche -->
  <div class="header-side header-left">
    <div class="header-logo-left">
      <img src="img/logo_ipra.png" alt="">
    </div>

    <div class="header-search">
      <input id="header-search" type="search" placeholder="Recherche..." autocomplete="off">
    </div>
  </div>

  <!-- Centre -->
  <div class="header-text">
    <div class="header-title">Protocoles de l'IPRA</div>
    <div class="header-subtitle">Hôpital privé Jacques Cartier</div>
  </div>

  <!-- Colonne droite -->
  <div class="header-side header-right">
    <!-- Le bouton “Accès rapide” sera injecté ici par ton JS (ou peut rester dans le header en absolute, mais idéalement ici) -->
    <div class="header-logo-right">
      <img src="img/logo_hpjc.png" alt="">
    </div>
  </div>
</header>


  <main class="container">
    <div id="app"></div>
  </main>

  <footer id="app-footer">
    <div class="theme-switcher">
      <span>Thème :</span>
      <label>
        <input type="radio" name="theme" id="theme-dark" value="dark">
        Sombre
      </label>
      <label>
        <input type="radio" name="theme" id="theme-light" value="light">
        Clair
      </label>
    </div>

    <button id="saricnews-logo"
            class="footer-actus-btn"
            type="button"
            onclick="openActus()"
            aria-label="Actualités">
      <img src="img/saricnews.png" alt="SARIC News">
    </button>

    <div class="footer-actions">
      <button id="back-button" class="back-btn">⮜ Retour</button>
    </div>
  </footer>
